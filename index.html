  }
  function getActiveList() { return mode === 'am' ? data.am : data.pm[selectedDayIndex]; }
  function setActiveList(arr) { if (mode === 'am') data.am = arr; else data.pm[selectedDayIndex] = arr; }
  function moveThumb() {
    var btn = mode === 'am' ? tabAm : tabPm;
    modeThumb.style.left = btn.offsetLeft + 'px';
    modeThumb.style.width = btn.offsetWidth + 'px';
  }

  tabAm.addEventListener('click', function () { setMode('am'); });
  tabPm.addEventListener('click', function () { setMode('pm'); });
  window.addEventListener('resize', moveThumb);

  editToggle.addEventListener('click', function () {
    editMode = !editMode;
    editToggle.setAttribute('aria-pressed', String(editMode));
    editToggle.textContent = editMode ? 'סיום עריכה' : 'עריכה';
    addStepForm.hidden = !editMode;
    renderSteps();
  });

  addStepBtn.addEventListener('click', function () {
    var name = newStepName.value.trim();
    if (!name) { newStepName.focus(); return; }
    var product = newStepProduct.value.trim();
    getActiveList().push({ id: uid(), name: name, product: product, done: false });
    newStepName.value = '';
    newStepProduct.value = '';
    save();
    renderAll();
    newStepName.focus();
  });
  [newStepName, newStepProduct].forEach(function (inp) {
    inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') addStepBtn.click(); });
  });

  function renderHeading() {
    var todayIndex = new Date().getDay();
    if (mode === 'am') {
      stepsHeading.textContent = 'שגרת הבוקר';
      daySubtitle.hidden = true;
      return;
    }
    stepsHeading.textContent = 'שגרת הערב · יום ' + DAY_LABELS[selectedDayIndex];
    if (selectedDayIndex === todayIndex) {
      daySubtitle.hidden = true;
    } else {
      daySubtitle.hidden = false;
      daySubtitle.innerHTML = '';
      daySubtitle.appendChild(document.createTextNode('צופה ביום שאינו היום'));
      var backBtn = document.createElement('button');
      backBtn.type = 'button';
      backBtn.textContent = 'חזרה להיום';
      backBtn.addEventListener('click', function () {
        selectedDayIndex = todayIndex;
        renderAll();
      });
      daySubtitle.appendChild(backBtn);
    }
  }

  function renderProgress() {
    var list = getActiveList();
    var done = list.filter(function (s) { return s.done; }).length;
    progressCount.textContent = done + '/' + list.length;
    progressFill.style.width = (list.length ? (done / list.length) * 100 : 0) + '%';
  }

  function renderWeekStrip() {
    weekStrip.innerHTML = '';
    var today = todayStr();
    var todayDate = dateStrToDate(today);
    var sunday = new Date(todayDate);
    sunday.setDate(sunday.getDate() - sunday.getDay());
    for (var i = 0; i < 7; i++) {
      var d = new Date(sunday);
      d.setDate(d.getDate() + i);
      var dateStr = todayStr(d);
      var isToday = dateStr === today;
      var entry = isToday
        ? { am: pct(data.am), pm: pct(data.pm[i]) }
        : (data.history[dateStr] || { am: 0, pm: 0 });
      var col = document.createElement('button');
      col.type = 'button';
      col.className = 'day-col' + (isToday ? ' is-today' : '') + (i === selectedDayIndex ? ' is-selected' : '');
      col.setAttribute('aria-pressed', String(i === selectedDayIndex));
      col.setAttribute('aria-label', DAY_LABELS[i] + (isToday ? ' (היום)' : ''));
      var segs = document.createElement('div');
      segs.className = 'segs';
      var segAm = document.createElement('div');
      segAm.className = 'seg';
      segAm.style.background = entry.am > 0 ? 'var(--am)' : 'var(--line)';
      segAm.style.opacity = entry.am > 0 ? (0.25 + entry.am * 0.75) : 1;
      var segPm = document.createElement('div');
      segPm.className = 'seg';
      segPm.style.background = entry.pm > 0 ? 'var(--pm)' : 'var(--line)';
      segPm.style.opacity = entry.pm > 0 ? (0.25 + entry.pm * 0.75) : 1;
      segs.appendChild(segAm);
      segs.appendChild(segPm);
      var label = document.createElement('span');
      label.className = 'day-label';
      label.textContent = new Intl.DateTimeFormat('he-IL', { weekday: 'narrow' }).format(d);
      col.appendChild(segs);
      col.appendChild(label);
      (function (dayIndex) {
        col.addEventListener('click', function () {
          selectedDayIndex = dayIndex;
          if (mode !== 'pm') { setMode('pm'); } else { renderAll(); }
        });
      })(i);
      weekStrip.appendChild(col);
    }
  }

  function attachDrag(li, handle) {
    var pointerId = null;
    var dragging = false;
    var startY = 0;

    handle.addEventListener('pointerdown', function (e) {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      pointerId = e.pointerId;
      handle.setPointerCapture(pointerId);
      dragging = true;
      startY = e.clientY;
      li.classList.add('is-dragging');
      e.preventDefault();
    });

    handle.addEventListener('pointermove', function (e) {
      if (!dragging) return;
      var dy = e.clientY - startY;
      li.style.transform = 'translateY(' + dy + 'px)';
      var siblings = Array.prototype.slice.call(stepsList.children);
      var idx = siblings.indexOf(li);
      var rect = li.getBoundingClientRect();
      var centerY = rect.top + rect.height / 2;
      var next = siblings[idx + 1];
      if (next) {
        var rNext = next.getBoundingClientRect();
        if (centerY > rNext.top + rNext.height / 2) {
          stepsList.insertBefore(next, li);
          startY += rNext.height + 10;
          return;
        }
      }
      var prev = siblings[idx - 1];
      if (prev) {
        var rPrev = prev.getBoundingClientRect();
        if (centerY < rPrev.top + rPrev.height / 2) {
          stepsList.insertBefore(li, prev);
          startY -= (rPrev.height + 10);
        }
      }
    });

    function endDrag(e) {
      if (!dragging) return;
      dragging = false;
      try { handle.releasePointerCapture(pointerId); } catch (err) {}
      li.classList.remove('is-dragging');
      li.style.transform = '';
      var ids = Array.prototype.map.call(stepsList.children, function (child) { return child.dataset.stepId; });
      var list = getActiveList();
      var reordered = ids.map(function (id) {
        return list.find(function (s) { return s.id === id; });
      }).filter(Boolean);
      if (reordered.length === list.length) { setActiveList(reordered); save(); }
    }
    handle.addEventListener('pointerup', endDrag);
    handle.addEventListener('pointercancel', endDrag);
  }

  function renderSteps() {
    stepsList.innerHTML = '';
    var list = getActiveList();
    if (!list.length) {
      var empty = document.createElement('li');
      empty.className = 'empty-state';
      empty.textContent = 'אין עדיין שלבים. הוסיפי את הראשון למטה.';
      stepsList.appendChild(empty);
      return;
    }
    list.forEach(function (step) {
      var li = document.createElement('li');
      li.className = 'step-row' + (step.done ? ' is-done' : '');
      li.dataset.stepId = step.id;

      if (editMode) {
        var handle = document.createElement('button');
        handle.type = 'button';
        handle.className = 'drag-handle';
        handle.setAttribute('aria-label', 'גרירה לשינוי סדר');
        handle.innerHTML = DRAG_ICON;

        var fields = document.createElement('div');
        fields.className = 'step-edit-fields';
        var nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.value = step.name;
        nameInput.setAttribute('aria-label', 'שם השלב');
        nameInput.addEventListener('input', function () { step.name = nameInput.value; save(); });
        var productInput = document.createElement('input');
        productInput.type = 'text';
        productInput.value = step.product;
        productInput.placeholder = 'מוצר (לא חובה)';
        productInput.setAttribute('aria-label', 'מוצר');
        productInput.addEventListener('input', function () { step.product = productInput.value; save(); });
        fields.appendChild(nameInput);
        fields.appendChild(productInput);

        var delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.type = 'button';
        delBtn.setAttribute('aria-label', 'מחיקת ' + step.name);
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', function () {
          setActiveList(getActiveList().filter(function (s) { return s.id !== step.id; }));
          save();
          renderAll();
        });

        li.appendChild(handle);
        li.appendChild(fields);
        li.appendChild(delBtn);
        attachDrag(li, handle);
      } else {
        var check = document.createElement('button');
        check.className = 'check-dot';
        check.type = 'button';
        check.setAttribute('aria-pressed', String(step.done));
        check.setAttribute('aria-label', step.name);
        check.innerHTML = CHECK_ICON;
        check.addEventListener('click', function () {
          step.done = !step.done;
          recordToday();
          save();
          renderProgress();
          renderWeekStrip();
          li.classList.toggle('is-done', step.done);
          check.setAttribute('aria-pressed', String(step.done));
        });

        var text = document.createElement('div');
        text.className = 'step-text';
        var nameEl = document.createElement('span');
        nameEl.className = 'step-name';
        nameEl.textContent = step.name;
        var prodEl = document.createElement('span');
        prodEl.className = 'step-product' + (step.product ? '' : ' is-empty');
        prodEl.textContent = step.product || 'הוסיפי מוצר בעריכה';
        text.appendChild(nameEl);
        text.appendChild(prodEl);

        li.appendChild(check);
        li.appendChild(text);
      }
      stepsList.appendChild(li);
    });
  }

  function renderAll() {
    renderHeading();
    renderProgress();
    renderWeekStrip();
    renderSteps();
  }

  setMode(mode);
})();
</script>
